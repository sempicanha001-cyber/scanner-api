global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'api-scanner'

scrape_configs:

  # Scanner API custom metrics (/metrics endpoint in api.py)
  - job_name: 'api-scanner'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics
    # NOTE: /metrics is blocked on nginx but Prometheus scrapes directly
    # via internal_net — no nginx involved

  # Redis metrics via redis_exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Celery/Flower metrics
  # Flower exposes /metrics when prometheus-client is installed + --enable_events flag
  # Both are now set in docker-compose.yml (flower command) and requirements.txt
  - job_name: 'celery-flower'
    static_configs:
      - targets: ['flower:5555']
    metrics_path: /metrics
