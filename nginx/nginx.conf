# nginx.conf — Reverse proxy with TLS, rate limiting, and security headers
# Requires: nginx >= 1.25.1 for "http2 on;" directive

worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/m;
    limit_req_zone $binary_remote_addr zone=scan_limit:10m rate=10r/m;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    upstream grafana_backend {
        server grafana:3000;
        keepalive 8;
    }

    upstream flower_backend {
        server flower:5555;
        keepalive 8;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ─────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "DENY"                                always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' wss: ws:;" always;

        # ── Health (no rate limit) ────────────────────────────────────────────
        location = /health {
            proxy_pass http://api_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── FIX: Block /metrics from public access ────────────────────────────
        location = /metrics {
            deny all;
            return 403;
        }

        # ── Scan endpoints (strict rate limit) ───────────────────────────────
        location /scans {
            limit_req  zone=scan_limit burst=5 nodelay;
            proxy_pass         http://api_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_http_version 1.1;
        }

        # ── General API (standard rate limit) ────────────────────────────────
        location /api/ {
            limit_req  zone=api_limit burst=20 nodelay;
            proxy_pass         http://api_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_http_version 1.1;
        }

        # ── WebSocket ─────────────────────────────────────────────────────────
        location /ws/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Grafana ───────────────────────────────────────────────────────────
        location /grafana/ {
            proxy_pass         http://grafana_backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_http_version 1.1;

            # Grafana Live (WebSocket)
            location /grafana/api/live/ {
                proxy_pass         http://grafana_backend/api/live/;
                proxy_http_version 1.1;
                proxy_set_header   Upgrade    $http_upgrade;
                proxy_set_header   Connection "upgrade";
                proxy_set_header   Host       $host;
            }
        }

        # ── Flower ────────────────────────────────────────────────────────────
        # NOTE: Flower is started with --url-prefix=flower to handle sub-path
        location /flower/ {
            proxy_pass         http://flower_backend/flower/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_http_version 1.1;

            # Flower task stream (EventSource/SSE)
            location /flower/api/task/stream {
                proxy_pass         http://flower_backend/flower/api/task/stream;
                proxy_http_version 1.1;
                proxy_set_header   Connection "";
                proxy_buffering    off;
                proxy_cache        off;
                chunked_transfer_encoding on;
            }
        }

        # ── Default (scanner API) ─────────────────────────────────────────────
        location / {
            limit_req  zone=api_limit burst=20 nodelay;
            proxy_pass         http://api_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_http_version 1.1;
        }
    }
}
